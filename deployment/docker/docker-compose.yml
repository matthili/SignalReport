version: '3.8'
services:
  signalreport:
    image: mafue/signalreport:latest
    container_name: signalreport
    ports:
      - "4567:4567"
    volumes:
      - .//app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:4567"]
      interval: 30s
      timeout: 10s
      retries: 3